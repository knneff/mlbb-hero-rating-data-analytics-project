name: Daily MLBB Data Update

on:
  schedule:
    # This is a 'Cron' expression. '0 0 * * *' means every day at midnight UTC.
    - cron: '0 0 * * *'
  workflow_dispatch: # This adds a "Run Now" button in the GitHub UI for testing

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    
    # Give this action permission to write (push) to your repository
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run the Scraper
        run: python scripts/scrape_mlbb.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          # Only commit if there are actually changes in the data
          git commit -m "data: daily update $(date +'%Y-%m-%d')" || exit 0
          git push
