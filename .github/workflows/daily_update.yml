name: Daily MLBB Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run the Scraper
        run: python ./scripts/scrape_mlbb.py

      - name: Verify Data Generation
        # This step will fail the action if the file wasn't created
        run: ls -l public/data.json

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          # The "|| exit 0" prevents the action from failing if there are no new meta changes
          git commit -m "data: daily update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin HEAD