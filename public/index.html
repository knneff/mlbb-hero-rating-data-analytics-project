<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Hero Meta Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .canvas-container { position: relative; background: #020617; border-radius: 1rem; overflow: hidden; }
        #heroCanvas { cursor: crosshair; width: 100%; height: 600px; display: block; }
        .tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            display: none;
            z-index: 50;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            min-width: 180px;
            transition: opacity 0.1s ease-out;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-center border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">MLBB Hero Analytics</h1>
                <p class="text-slate-400">Mythic+ Performance: Win Rate vs. Popularity</p>
            </div>
            <div id="status" class="text-xs bg-slate-800 px-4 py-2 rounded-full text-slate-300 font-mono">
                Initializing...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Sidebar Stats -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">Highest Win Rate</h3>
                    <div id="topWinRate" class="text-xl font-bold text-emerald-400">--</div>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">Most Popular</h3>
                    <div id="topUseRate" class="text-xl font-bold text-blue-400">--</div>
                </div>
                <div class="bg-blue-900/20 p-4 rounded-xl border border-blue-800/50 text-sm text-blue-200">
                    <p>💡 <b>Tip:</b> Hover over icons to see detailed Ban Rates and Pick stats.</p>
                </div>
            </div>

            <!-- Main Canvas Chart -->
            <div class="lg:col-span-3">
                <div id="container" class="canvas-container shadow-2xl border border-slate-800">
                    <div id="tooltip" class="tooltip"></div>
                    <canvas id="heroCanvas"></canvas>
                    
                    <!-- Axis Labels -->
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">Appearance Rate (Pick %)</div>
                    
                    <!-- Fixed Win Rate Axis Label Position -->
                    <div class="absolute left-4 top-1/2 -rotate-90 -translate-x-1/2 -translate-y-1/2 text-[10px] font-black text-slate-600 uppercase tracking-[0.2em] whitespace-nowrap" style="transform-origin: center center;">
                        Win Rate (%)
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('heroCanvas');
        const container = document.getElementById('container');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const statusEl = document.getElementById('status');
        
        let heroes = [];
        let images = {};
        const padding = 70;
        let hoverHero = null;

        function getIconSize() {
            return window.innerWidth < 768 ? 14 : 22;
        }

        async function init() {
            try {
                const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
                const dataUrl = baseUrl + 'data.json';
                
                const response = await fetch(dataUrl);
                if (!response.ok) throw new Error("Data not found at " + dataUrl);
                
                heroes = await response.json();
                statusEl.innerText = `Dataset: ${heroes.length} Heroes`;
                
                updateSidebar();
                // Trigger initial draw to show axes while images load
                draw();
                loadImages();
            } catch (err) {
                statusEl.innerText = "Error: data.json not found";
                statusEl.classList.add('text-red-400');
                console.error("Fetch failed:", err);
            }
        }

        function updateSidebar() {
            if (!heroes.length) return;
            const sortedWin = [...heroes].sort((a, b) => b.winRate - a.winRate);
            const sortedUse = [...heroes].sort((a, b) => b.useRate - a.useRate);
            
            document.getElementById('topWinRate').innerText = `${sortedWin[0].name} (${(sortedWin[0].winRate * 100).toFixed(2)}%)`;
            document.getElementById('topUseRate').innerText = `${sortedUse[0].name} (${(sortedUse[0].useRate * 100).toFixed(2)}%)`;
        }

        function loadImages() {
            if (heroes.length === 0) return;

            // Load images in batches to avoid network congestion
            heroes.forEach((hero, index) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = hero.avatar;
                img.onload = () => {
                    images[hero.heroId] = img;
                    // Redraw whenever a new image finishes loading
                    requestAnimationFrame(draw);
                };
                img.onerror = () => {
                    // Placeholder logic if needed
                    requestAnimationFrame(draw);
                };
            });
        }

        function drawHero(hero, isHovered, minWin, maxWin, minUse, maxUse, w, h) {
            const x = padding + ((hero.useRate - minUse) / (maxUse - minUse)) * (w - 2 * padding);
            const y = (h - padding) - ((hero.winRate - minWin) / (maxWin - minWin)) * (h - 2 * padding);

            hero.posX = x;
            hero.posY = y;

            const baseSize = getIconSize();
            const size = isHovered ? baseSize * 2.5 : baseSize;

            if (images[hero.heroId]) {
                ctx.save();
                if (isHovered) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
                }
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(images[hero.heroId], x - size/2, y - size/2, size, size);
                ctx.restore();
                
                ctx.strokeStyle = hero.winRate >= 0.5 ? '#10b981' : '#f43f5e';
                ctx.lineWidth = isHovered ? 3 : 1.5;
                ctx.beginPath();
                ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                // Draw a colored dot as a placeholder while loading
                ctx.fillStyle = hero.winRate >= 0.5 ? 'rgba(16, 185, 129, 0.3)' : 'rgba(244, 63, 94, 0.3)';
                ctx.beginPath();
                ctx.arc(x, y, baseSize / 2, 0, Math.PI * 2);
                ctx.fill();
                // Add a small pulse border
                ctx.strokeStyle = hero.winRate >= 0.5 ? '#10b981' : '#f43f5e';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function draw() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            ctx.scale(dpr, dpr);

            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;

            ctx.clearRect(0, 0, w, h);

            if (heroes.length === 0) return;

            const winRates = heroes.map(h => h.winRate);
            const useRates = heroes.map(h => h.useRate);
            
            const minWin = Math.min(...winRates) * 0.98;
            const maxWin = Math.max(...winRates) * 1.02;
            const minUse = 0;
            const maxUse = Math.max(...useRates) * 1.1;

            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            ctx.font = '10px Inter, sans-serif';
            ctx.fillStyle = '#475569';

            ctx.textAlign = 'right';
            for (let i = 0; i <= 5; i++) {
                const val = minWin + (i * (maxWin - minWin) / 5);
                const y = (h - padding) - (i * (h - 2 * padding) / 5);
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(w - padding, y);
                ctx.stroke();
                ctx.fillText((val * 100).toFixed(1) + '%', padding - 10, y + 3);
            }

            ctx.textAlign = 'center';
            for (let i = 0; i <= 5; i++) {
                const val = minUse + (i * (maxUse - minUse) / 5);
                const x = padding + (i * (w - 2 * padding) / 5);
                ctx.beginPath();
                ctx.moveTo(x, padding);
                ctx.lineTo(x, h - padding);
                ctx.stroke();
                ctx.fillText((val * 100).toFixed(1) + '%', x, h - padding + 20);
            }

            // Draw non-hovered heroes first
            heroes.forEach(hero => {
                if (hero !== hoverHero) {
                    drawHero(hero, false, minWin, maxWin, minUse, maxUse, w, h);
                }
            });

            // Draw hovered hero on top
            if (hoverHero) {
                drawHero(hoverHero, true, minWin, maxWin, minUse, maxUse, w, h);
            }
        }

        function handlePointerMove(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = clientX - rect.left;
            const mouseY = clientY - rect.top;
            const currentIconSize = getIconSize();

            let found = null;
            for (let i = heroes.length - 1; i >= 0; i--) {
                const hero = heroes[i];
                const dist = Math.sqrt((mouseX - hero.posX)**2 + (mouseY - hero.posY)**2);
                if (dist < currentIconSize / 1.2) {
                    found = hero;
                    break;
                }
            }

            if (found) {
                if (hoverHero !== found) {
                    hoverHero = found;
                    draw();
                }
                
                tooltip.style.display = 'block';
                tooltip.innerHTML = `
                    <div class="flex items-center gap-3 mb-2">
                        <img src="${found.avatar}" class="w-10 h-10 rounded-full border border-slate-700">
                        <div>
                            <div class="font-bold text-white text-base leading-tight">${found.name}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase">Mythic+ Stats</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-x-4 gap-y-2 border-t border-slate-800 pt-2 mt-2">
                        <div>
                            <div class="text-[9px] text-slate-500 uppercase font-black">Win Rate</div>
                            <div class="font-mono font-bold ${found.winRate >= 0.5 ? 'text-emerald-400' : 'text-rose-400'}">${(found.winRate * 100).toFixed(2)}%</div>
                        </div>
                        <div>
                            <div class="text-[9px] text-slate-500 uppercase font-black">Pick Rate</div>
                            <div class="font-mono font-bold text-blue-400">${(found.useRate * 100).toFixed(2)}%</div>
                        </div>
                        <div class="col-span-2">
                            <div class="text-[9px] text-slate-500 uppercase font-black">Ban Rate</div>
                            <div class="font-mono font-bold text-amber-400">${(found.banRate * 100).toFixed(2)}%</div>
                        </div>
                    </div>
                `;

                const containerRect = container.getBoundingClientRect();
                const tooltipWidth = tooltip.offsetWidth;
                const offset = 35;

                let posX = mouseX + offset;
                let posY = mouseY - (tooltip.offsetHeight / 2);

                if (posX + tooltipWidth > containerRect.width - 10) {
                    posX = mouseX - tooltipWidth - offset;
                }

                if (posY < 10) posY = 10;
                if (posY + tooltip.offsetHeight > containerRect.height - 10) {
                    posY = containerRect.height - tooltip.offsetHeight - 10;
                }

                tooltip.style.left = posX + 'px';
                tooltip.style.top = posY + 'px';
                tooltip.style.opacity = '1';
                
            } else if (hoverHero) {
                hoverHero = null;
                tooltip.style.display = 'none';
                tooltip.style.opacity = '0';
                draw();
            }
        }

        canvas.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        });

        window.addEventListener('resize', draw);
        init();
    </script>
</body>
</html>
